<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medición de Almacén Nativa</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    
    <style>
        /* --- ESTILOS VISUALES --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: Arial, sans-serif; background-color: #000;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #header-info {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10;
        }

        .info-row {
            display: flex; align-items: center; margin-bottom: 8px; font-size: 16px;
        }

        .info-row:last-child {
            margin-bottom: 0; justify-content: space-between;
        }

        .status-dot {
            height: 12px; width: 12px; background-color: #28a745; 
            border-radius: 50%; display: inline-block; margin-left: 10px;
        }
        
        #status-opencv {
            color: #d9534f; font-size: 12px; font-weight: bold; margin-left: auto;
        }

        .bold { font-weight: bold; margin-right: 5px; }

        /* --- CONTENEDOR DE CÁMARA --- */
        #camera-container {
            flex-grow: 1; position: relative; width: 100%; background-color: #222;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        #video-feed {
            display: none; 
        }

        #overlay-canvas {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        /* --- PIE DE PÁGINA --- */
        #footer-controls {
            background-color: #fff; padding: 15px;
            display: flex; justify-content: center; align-items: center; z-index: 10;
            gap: 15px;
        }

        #btn-capturar {
            background-color: #f0f0f0; border: 2px solid #333; border-radius: 25px;
            padding: 15px 40px; font-size: 18px; font-weight: bold;
            cursor: pointer; width: 60%; max-width: 300px;
            transition: background-color 0.2s;
        }

        #btn-capturar:active { background-color: #ccc; }

        #btn-voltear {
            background-color: #333; color: white; border: none; border-radius: 25px;
            padding: 15px 20px; font-size: 16px; font-weight: bold;
            cursor: pointer; width: 35%; max-width: 150px;
            transition: background-color 0.2s;
        }

        #btn-voltear:active { background-color: #555; }
    </style>
</head>
<body>

    <div id="header-info">
        <div class="info-row">
            <span class="bold">Estado del sensor</span>
            <span class="status-dot"></span>
            <span id="status-opencv">Cargando motor de visión...</span>
        </div>
        <div class="info-row">
            <span class="bold">Espacios detectados:</span> 
            <span id="txt-medidas" style="color: #0066cc; font-weight: bold;">Calculando...</span>
        </div>
        <div class="info-row">
            <div><span class="bold"># Lote:</span> <span id="txt-lote">A-01</span></div>
            <div><span class="bold">ID:</span> <span id="txt-id">1045</span></div>
        </div>
    </div>

    <div id="camera-container">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div id="footer-controls">
        <button id="btn-voltear" disabled>🔄 Voltear</button>
        <button id="btn-capturar" disabled>Capturar FOTO</button>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('overlay-canvas');
        const btnCapturar = document.getElementById('btn-capturar');
        const btnVoltear = document.getElementById('btn-voltear');
        const statusText = document.getElementById('status-opencv');
        const txtMedidas = document.getElementById('txt-medidas');
        
        let streaming = false;
        let src, dst, gray, edges;
        let cap;
        
        let currentStream = null;
        let facingMode = "environment"; 

        function onOpenCvReady() {
            cv['onRuntimeInitialized'] = () => {
                statusText.style.color = '#28a745';
                statusText.innerText = "Sistema Listo";
                btnCapturar.disabled = false;
                btnVoltear.disabled = false;
                iniciarCamara();
            };
        }

        function detenerCamara() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        function iniciarCamara() {
            detenerCamara();

            navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode }, audio: false })
                .then(function(stream) {
                    currentStream = stream;
                    video.srcObject = stream;
                    video.play();
                })
                .catch(function(err) {
                    console.error("Error cámara: ", err);
                    alert("Por favor, permite el acceso a la cámara.");
                });

            video.addEventListener('canplay', function(ev){
                if (streaming) {
                    if (video.videoWidth !== canvas.width || video.videoHeight !== canvas.height) {
                        video.width = video.videoWidth;
                        video.height = video.videoHeight;
                        canvas.width = video.width;
                        canvas.height = video.height;
                        
                        if(src) src.delete();
                        if(dst) dst.delete();
                        if(gray) gray.delete();
                        if(edges) edges.delete();
                        
                        src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                        dst = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                        gray = new cv.Mat();
                        edges = new cv.Mat();
                        cap = new cv.VideoCapture(video);
                    }
                    return; 
                }

                if (!streaming) {
                    video.width = video.videoWidth;
                    video.height = video.videoHeight;
                    canvas.width = video.width;
                    canvas.height = video.height;
                    
                    src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                    dst = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                    gray = new cv.Mat();
                    edges = new cv.Mat();
                    cap = new cv.VideoCapture(video);
                    
                    streaming = true;
                    requestAnimationFrame(procesarFrame);
                }
            }, false);
        }

        btnVoltear.addEventListener('click', () => {
            facingMode = (facingMode === "environment") ? "user" : "environment";
            iniciarCamara();
        });

        function procesarFrame() {
            if (!streaming) return;

            // Variables locales para gestionar la memoria en cada frame
            let contoursLocal = new cv.MatVector();
            let hierarchyLocal = new cv.Mat();
            // Kernel diseñado para unir las hojas verticalmente y formar columnas
            let kernelLocal = cv.Mat.ones(25, 3, cv.CV_8U); 

            try {
                cap.read(src);
                src.copyTo(dst); 

                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // 1. Desenfocar para ignorar pequeñas texturas del papel
                let ksize = new cv.Size(5, 5);
                cv.GaussianBlur(gray, gray, ksize, 0, 0, cv.BORDER_DEFAULT);
                
                // 2. Binarización de Otsu (Separa automáticamente el papel claro del fondo oscuro)
                cv.threshold(gray, edges, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
                
                // 3. Dilatación: Convierte las pilas de hojas en bloques (columnas) unificados
                cv.dilate(edges, edges, kernelLocal);

                // 4. Encontrar el contorno de esas columnas
                cv.findContours(edges, contoursLocal, hierarchyLocal, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let columnas = [];

                for (let i = 0; i < contoursLocal.size(); ++i) {
                    let cnt = contoursLocal.get(i);
                    let area = cv.contourArea(cnt);
                    
                    // 5. Filtrar áreas pequeñas para evitar detectar sombras como columnas
                    if (area > 4000) {
                        let rect = cv.boundingRect(cnt);
                        // Asegurar que lo detectado tiene una altura decente
                        if (rect.height > 100) {
                            columnas.push(rect);
                        }
                    }
                    cnt.delete(); // Limpiar contorno iterado
                }

                // 6. Ordenar las columnas detectadas de izquierda a derecha
                columnas.sort((a, b) => a.x - b.x);

                let infoMedidas = [];

                // 7. Calcular los huecos entre las columnas
                for (let i = 0; i < columnas.length - 1; i++) {
                    let col1 = columnas[i];
                    let col2 = columnas[i+1];
                    
                    // Calcular la distancia: (Inicio de col2) - (Fin de col1)
                    let espacio_vacio = col2.x - (col1.x + col1.width);

                    // Si hay una separación real de más de 10 píxeles
                    if (espacio_vacio > 10) {
                        let texto = `${espacio_vacio}px`;
                        
                        // Posicionar el texto en medio del hueco y al centro vertical de la pantalla
                        let centroX = (col1.x + col1.width) + (espacio_vacio / 2) - 20;
                        let centroY = dst.rows / 2;
                        let origenTexto = new cv.Point(centroX, centroY);
                        
                        // Solo dibujar texto flotante
                        cv.putText(dst, texto, origenTexto, cv.FONT_HERSHEY_SIMPLEX, 0.7, [0, 255, 0, 255], 2);
                        
                        infoMedidas.push(`${espacio_vacio}px`);
                    }
                }

                // Actualizar el texto superior con todos los huecos detectados
                txtMedidas.innerText = infoMedidas.length > 0 ? infoMedidas.join(" | ") : "0 huecos";

                cv.imshow('overlay-canvas', dst);

            } catch (err) {
                // Silenciamos errores de interrupción del frame
            } finally {
                // Obligatorio para evitar memory leaks (congelamiento de cámara)
                contoursLocal.delete();
                hierarchyLocal.delete();
                kernelLocal.delete();
            }

            requestAnimationFrame(procesarFrame);
        }

        btnCapturar.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `captura_almacen_${new Date().getTime()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
